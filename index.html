<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>UP DODGE XR</title>
    <style>
      :root {
        color-scheme: dark;
        --cyan: #00ffff;
        --teal: #00ffcc;
        --magenta: #ff2bd6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, "Segoe UI", Arial, sans-serif;
        background: #04040c;
      }

      #enter-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        color: #dffaff;
        background: radial-gradient(circle at 50% 30%, #0a1336 0%, #04040c 70%);
        z-index: 10;
      }

      /* Receding neon floor grid — echoes the in-game ring. */
      .grid {
        position: absolute;
        left: 50%;
        bottom: -2%;
        width: 260%;
        height: 72%;
        transform: translateX(-50%) perspective(440px) rotateX(64deg);
        transform-origin: bottom center;
        background-image:
          linear-gradient(rgba(0, 255, 255, 0.35) 1.5px, transparent 1.5px),
          linear-gradient(90deg, rgba(0, 255, 255, 0.22) 1.5px, transparent 1.5px);
        background-size: 54px 54px;
        animation: gridmove 2.6s linear infinite;
        -webkit-mask: linear-gradient(to top, #000 8%, transparent 88%);
        mask: linear-gradient(to top, #000 8%, transparent 88%);
        pointer-events: none;
      }
      @keyframes gridmove {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 0 54px;
        }
      }

      .content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.4rem;
        text-align: center;
        padding: 0 1rem;
      }

      .tag {
        font-size: clamp(0.7rem, 2.4vw, 0.95rem);
        font-weight: 700;
        letter-spacing: 0.5em;
        text-indent: 0.5em;
        color: var(--magenta);
        text-shadow: 0 0 12px var(--magenta);
        margin: 0;
      }

      #enter-overlay h1 {
        margin: 0;
        font-size: clamp(2.8rem, 11vw, 6rem);
        font-weight: 800;
        letter-spacing: 0.1em;
        color: #eafdff;
        text-shadow:
          0 0 6px #fff,
          0 0 18px var(--cyan),
          0 0 42px var(--cyan),
          0 0 80px #0bf;
        animation: titlepulse 2.4s ease-in-out infinite;
      }
      @keyframes titlepulse {
        0%, 100% {
          text-shadow: 0 0 6px #fff, 0 0 18px var(--cyan), 0 0 42px var(--cyan), 0 0 80px #0bf;
        }
        50% {
          text-shadow: 0 0 8px #fff, 0 0 26px var(--cyan), 0 0 60px var(--cyan), 0 0 110px #0df;
        }
      }

      #enter-btn {
        margin-top: 0.4rem;
        padding: 0.95rem 3rem;
        font-size: clamp(1.05rem, 4vw, 1.35rem);
        font-weight: 700;
        letter-spacing: 0.14em;
        color: #04040c;
        background: linear-gradient(180deg, #5dffe6, var(--teal));
        border: none;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 0 22px var(--teal), 0 0 48px #00ffcc66;
        animation: btnpulse 2s ease-in-out infinite;
        transition: transform 0.1s ease, box-shadow 0.2s ease;
      }
      @keyframes btnpulse {
        0%, 100% {
          box-shadow: 0 0 22px var(--teal), 0 0 48px #00ffcc66;
        }
        50% {
          box-shadow: 0 0 30px var(--teal), 0 0 72px #00ffcc99;
        }
      }
      #enter-btn:hover {
        transform: translateY(-2px) scale(1.03);
        box-shadow: 0 0 38px var(--teal), 0 0 90px #00ffccaa;
      }
      #enter-btn:active {
        transform: translateY(0) scale(0.99);
      }

      #enter-overlay small {
        margin-top: 0.4rem;
        max-width: 26rem;
        line-height: 1.5;
        color: #6f93a4;
      }
    </style>
  </head>
  <body>
    <div id="scene-container"></div>
    <div id="enter-overlay">
      <div class="grid" aria-hidden="true"></div>
      <div class="content">
        <p class="tag">ROOMSCALE · AR · DODGE</p>
        <h1>UP&nbsp;DODGE&nbsp;XR</h1>
        <button id="enter-btn">ENTER AR</button>
        <small>Requires a WebXR AR headset (e.g. Meta Quest). Clear ~2 × 2 m of space.</small>
      </div>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
